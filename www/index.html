    <style>
      body {
        font-family: system-ui, sans-serif;

  <body>
    <h1>Downhill Tracker</h1>
    <p>
      Esta pantalla es el stub en <code>www/</code>. Para APK con la app empaquetada
      (sin URL remota) ejecuta <code>yarn cap:sync</code>: genera <code>out/</code> y
      copia al proyecto Android. Para modo WebView remoto usa
      <code>yarn cap:sync:remote</code> y <code>CAPACITOR_SERVER_URL</code> en
      <code>.env.local</code>.
    </p>
  </body>
